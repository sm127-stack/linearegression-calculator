<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Linear Regression Calculator</title>
  <style>
    *{box-sizing:border-box;font-family:Arial}
    body{margin:0;padding:0}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    .row{display:flex;gap:24px;flex-wrap:wrap}
    .card{flex:1;min-width:320px;border:1px solid #bbb;padding:18px}
    label{display:block;margin-top:10px}
    input{width:100%;padding:12px;margin-top:6px;border:1px solid #ddd}
    .btn{display:inline-block;padding:14px 20px;background:#777;color:#fff;text-decoration:none;border:0;cursor:pointer}
    .btn.full{width:100%;margin-top:14px}
    .center{display:flex;justify-content:center;margin-top:30px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <form class="card" action="https://linearegression-backend.onrender.com/login" method="post">
        <h2>Login</h2>
        <label>Email</label>
        <input name="email" type="email" required>
        <label>Password</label>
        <input name="psw" type="password" required>
        <button class="btn full" type="submit">Login</button>
      </form>

      <form class="card" action="https://linearegression-backend.onrender.com/signup" method="post">
        <h2>Sign Up</h2>
        <label>Email</label>
        <input name="email" type="email" required>
        <label>Password</label>
        <input name="psw" type="password" required>
        <button class="btn full" type="submit">Sign Up</button>
      </form>
    </div>

    <div class="center">
      <a class="btn" href="https://linearegression-backend.onrender.com/guest">Open Calculator</a>
    </div>
  </div>
</body>
</html>
