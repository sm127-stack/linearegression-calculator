<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Linear Regression Calculator</title>
  <style>
    *{box-sizing:border-box;font-family:Arial}
    .btn{display:inline-block;padding:14px 20px;background:#888;color:#fff;cursor:pointer;text-decoration:none;border:0}
    .center-screen{display:flex;justify-content:center;align-items:center;height:60vh}
    .topbar{display:flex;gap:10px;padding:16px}
    .box{background:#fff;margin:16px;padding:20px;border:1px solid #888;max-width:420px}
    input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd}
    .full{width:100%;margin-top:10px;background:#888;color:#fff;padding:14px 20px;border:0;cursor:pointer}
  </style>
</head>
<body>

  <div class="topbar">
    <!-- LOGIN -->
    <form class="box" action="https://linearegression-backend.onrender.com/login" method="post">
      <h3>Login</h3>
      <label>Email</label>
      <input name="email" type="email" required>
      <label>Password</label>
      <input name="psw" type="password" required>
      <button class="full" type="submit">Login</button>
    </form>

    <!-- SIGNUP -->
    <form class="box" action="https://linearegression-backend.onrender.com/signup" method="post">
      <h3>Sign Up</h3>
      <label>Email</label>
      <input name="email" type="email" required>
      <label>Password</label>
      <input name="psw" type="password" required>
      <button class="full" type="submit">Sign Up</button>
    </form>
  </div>

  <div class="center-screen">
    <a class="btn" href="https://linearegression-backend.onrender.com/guest">Open Calculator</a>
  </div>

</body>
</html>
